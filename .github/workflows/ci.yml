name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies (CPU torch)
        run: |
          pip install numpy torch --index-url https://download.pytorch.org/whl/cpu
          pip install music21 pretty_midi
      - name: Syntax check (all Python files)
        run: python -m compileall -q src evaluation tools tests data_prep
      - name: Encoding tests (schemes A-D)
        run: python tests/test_encoding.py
      - name: Preprocessing tests (score -> npz -> tokens -> MIDI)
        run: python tests/test_data_prep.py
      - name: Encoding demo
        run: python tools/encoding_demo.py
